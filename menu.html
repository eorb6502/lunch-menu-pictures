<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>오늘의 춘식도락</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #f5f5f5; font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', sans-serif; padding: 20px; }
h1 { text-align: center; font-size: 22px; margin-bottom: 20px; color: #333; }
.grid { display: flex; flex-direction: column; gap: 16px; max-width: 600px; margin: 0 auto; }
.card { background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
.card img { width: 100%; display: block; cursor: pointer; transition: opacity 0.2s; }
.card img:active { opacity: 0.8; }
.card .label { padding: 12px 16px; }
.card .category { font-size: 13px; font-weight: 700; color: #666; margin-bottom: 2px; }
.card .name { font-size: 15px; color: #333; }
.empty { text-align: center; color: #999; margin-top: 40px; font-size: 15px; }

.overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; justify-content: center; align-items: center; }
.overlay.active { display: flex; }
.overlay img { max-width: 95%; max-height: 95vh; object-fit: contain; }
</style>
</head>
<body>
<h1>오늘의 춘식도락</h1>
<div class="grid" id="grid"></div>
<div class="overlay" id="overlay"><img id="overlay-img"></div>

<script>
const ALLOWED_IMAGE_HOSTS = ['eliga-order.kr.object.ncloudstorage.com'];

const grid = document.getElementById('grid');
const overlay = document.getElementById('overlay');
const overlayImg = document.getElementById('overlay-img');

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function isAllowedUrl(urlStr) {
  try {
    const u = new URL(urlStr);
    return u.protocol === 'https:' && ALLOWED_IMAGE_HOSTS.some(h => u.hostname === h);
  } catch { return false; }
}

try {
  const raw = new URLSearchParams(location.search).get('data');
  if (!raw) throw new Error('no data');
  // URL-safe base64 → 표준 base64로 변환 후 디코딩
  var b64 = raw.replace(/-/g, '+').replace(/_/g, '/');
  while (b64.length % 4) b64 += '=';
  const items = JSON.parse(decodeURIComponent(escape(atob(b64))));

  if (!Array.isArray(items) || !items.length) throw new Error('empty');

  items.forEach(item => {
    const imgUrl = item.i || item.image;
    const name = item.n || item.name || '';
    const category = item.c || item.category || '';

    if (!imgUrl || !isAllowedUrl(imgUrl)) return;

    const card = document.createElement('div');
    card.className = 'card';

    const img = document.createElement('img');
    img.src = imgUrl;
    img.alt = name;
    img.onclick = () => { overlayImg.src = imgUrl; overlay.classList.add('active'); };

    const label = document.createElement('div');
    label.className = 'label';
    label.innerHTML = '<div class="category">' + esc(category) + '</div><div class="name">' + esc(name) + '</div>';

    card.appendChild(img);
    card.appendChild(label);
    grid.appendChild(card);
  });

  if (!grid.children.length) throw new Error('no valid items');
} catch (e) {
  grid.innerHTML = '<p class="empty">메뉴 정보를 불러올 수 없습니다.</p>';
}

overlay.onclick = () => overlay.classList.remove('active');
</script>
</body>
</html>
