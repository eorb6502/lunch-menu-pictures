<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>오늘의 춘식도락</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #f5f5f5; font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', sans-serif; padding: 20px; }
h1 { text-align: center; font-size: 22px; margin-bottom: 20px; color: #333; }
.grid { display: flex; flex-direction: column; gap: 16px; max-width: 600px; margin: 0 auto; }
.card { background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
.card img { width: 100%; display: block; cursor: pointer; transition: opacity 0.2s; }
.card img:active { opacity: 0.8; }
.card .label { padding: 12px 16px; }
.card .header { display: flex; justify-content: space-between; align-items: center; gap: 8px; margin-bottom: 4px; }
.card .category { font-size: 13px; font-weight: 700; color: #666; }
.card .traffic { font-size: 12px; font-weight: 600; white-space: nowrap; }
.card .traffic::before { content: '●'; margin-right: 3px; font-size: 9px; vertical-align: middle; }
.card .traffic.smooth { color: #2d7a3a; }
.card .traffic.busy { color: #c77700; }
.card .traffic.heavy { color: #c0392b; }
.card .name-row { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; }
.card .name { font-size: 15px; color: #333; flex: 1; }
.card .kcal { font-size: 12px; color: #888; font-weight: 600; white-space: nowrap; }
.card .dishes { font-size: 13px; color: #666; line-height: 1.6; margin-top: 8px; padding-top: 8px; border-top: 1px dashed #eee; }
.empty { text-align: center; color: #999; margin-top: 40px; font-size: 15px; }

.overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; justify-content: center; align-items: center; }
.overlay.active { display: flex; }
.overlay img { max-width: 95%; max-height: 95vh; object-fit: contain; }
</style>
</head>
<body>
<h1>오늘의 춘식도락</h1>
<div class="grid" id="grid"></div>
<div class="overlay" id="overlay"><img id="overlay-img"></div>

<script>
const ALLOWED_IMAGE_HOSTS = ['eliga-order.kr.object.ncloudstorage.com'];

const grid = document.getElementById('grid');
const overlay = document.getElementById('overlay');
const overlayImg = document.getElementById('overlay-img');

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function isAllowedUrl(urlStr) {
  try {
    const u = new URL(urlStr);
    return u.protocol === 'https:' && ALLOWED_IMAGE_HOSTS.some(h => u.hostname === h);
  } catch { return false; }
}

try {
  const raw = new URLSearchParams(location.search).get('data');
  if (!raw) throw new Error('no data');
  // URL-safe base64 → 표준 base64로 변환 후 디코딩
  var b64 = raw.replace(/-/g, '+').replace(/_/g, '/');
  while (b64.length % 4) b64 += '=';
  const items = JSON.parse(decodeURIComponent(escape(atob(b64))));

  if (!Array.isArray(items) || !items.length) throw new Error('empty');

  const TRAFFIC_MAP = {
    SMOOTH: { label: '원활', cls: 'smooth' },
    BUSY:   { label: '혼잡', cls: 'busy' },
    HEAVY:  { label: '지연', cls: 'heavy' },
  };

  items.forEach(item => {
    const imgUrl = item.i || item.image;
    const name = item.n || item.name || '';
    const category = item.c || item.category || '';
    const kcal = item.k || '';
    const dishes = Array.isArray(item.d) ? item.d : [];
    const traffic = item.t || '';

    if (!imgUrl || !isAllowedUrl(imgUrl)) return;

    const card = document.createElement('div');
    card.className = 'card';

    const img = document.createElement('img');
    img.src = imgUrl;
    img.alt = name;
    img.onclick = () => { overlayImg.src = imgUrl; overlay.classList.add('active'); };

    const label = document.createElement('div');
    label.className = 'label';

    let trafficHtml = '';
    if (traffic) {
      const t = TRAFFIC_MAP[traffic] || { label: traffic, cls: '' };
      trafficHtml = '<div class="traffic ' + t.cls + '">' + esc(t.label) + '</div>';
    }

    const kcalHtml = kcal ? '<div class="kcal">' + esc(kcal) + '</div>' : '';

    const sides = dishes
      .filter(d => d && !d.includes('♥') && d.trim() !== name.trim())
      .map(d => esc(d.trim()));
    const dishesHtml = sides.length ? '<div class="dishes">' + sides.join(' · ') + '</div>' : '';

    label.innerHTML =
      '<div class="header"><div class="category">' + esc(category) + '</div>' + trafficHtml + '</div>' +
      '<div class="name-row"><div class="name">' + esc(name) + '</div>' + kcalHtml + '</div>' +
      dishesHtml;

    card.appendChild(img);
    card.appendChild(label);
    grid.appendChild(card);
  });

  if (!grid.children.length) throw new Error('no valid items');
} catch (e) {
  grid.innerHTML = '<p class="empty">메뉴 정보를 불러올 수 없습니다.</p>';
}

overlay.onclick = () => overlay.classList.remove('active');
</script>
</body>
</html>
